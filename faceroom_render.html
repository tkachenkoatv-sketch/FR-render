<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FaceRoom render</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
:root{--blue:#8EC5DA;--beige:#DFD7C8;--black:#1A1A1A}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
.canvas{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;font-family:'Montserrat','Arial Narrow',sans-serif}
.canvas .bg{position:absolute;inset:0;background-size:cover}
.canvas .scrim{position:absolute;inset:0}
.canvas .content{position:absolute;inset:0;display:flex;flex-direction:column;color:#fff}
.canvas.dark .content{color:var(--black)}
.canvas .disc{text-align:center;font-weight:500;opacity:.88;line-height:1.25}
.canvas .mid{flex:1;display:flex;flex-direction:column;justify-content:center}
.canvas .head{font-weight:800;text-transform:uppercase;line-height:1.0;letter-spacing:-.01em}
.canvas .drow{display:flex;align-items:center;gap:.5em;font-weight:600}
.canvas .subh{font-weight:500;line-height:1.22;opacity:.96}
.canvas .band{position:relative}
.canvas .band .plate{position:absolute;inset:0;margin:0 -1000px}
.canvas .band .in{position:relative;padding:.5em 0}
.canvas .band .hr{height:1px;background:currentColor;opacity:.6}
.canvas .band .cond{font-weight:700;text-transform:uppercase;line-height:1.08;padding:.35em 0}
.canvas .logo{text-align:center}
.canvas .logo img{display:block;margin:0 auto}
.canvas.wide .content{align-items:flex-end;justify-content:center;text-align:right}
.canvas.wide .mid{flex:0 0 auto;align-items:flex-end}
</style>
<div id="root"></div>
