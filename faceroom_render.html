<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FaceRoom render</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
:root{--blue:#8EC5DA;--beige:#DFD7C8;--black:#1A1A1A}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
.canvas{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;font-family:'Montserrat','Arial Narrow',sans-serif;color:#fff}
.canvas.dark{color:var(--black)}
.canvas .bg{position:absolute;inset:0;background-size:cover;background-repeat:no-repeat}
.canvas .scrim{position:absolute;inset:0}
/* preset mode */
.canvas .content{position:absolute;inset:0;display:flex;flex-direction:column}
.canvas .disc0{text-align:center;font-weight:500;opacity:.88;line-height:1.25}
.canvas .mid{flex:1;display:flex;flex-direction:column;justify-content:center}
.canvas .head0{font-weight:800;text-transform:uppercase;line-height:1.0;letter-spacing:-.01em}
.canvas .drow{display:flex;align-items:center;gap:.5em;font-weight:600}
.canvas .subh{font-weight:500;line-height:1.22;opacity:.96}
.canvas .band{position:relative}
.canvas .band .plate{position:absolute;inset:0;margin:0 -1000px}
.canvas .band .in{position:relative;padding:.5em 0}
.canvas .band .hr{height:1px;background:currentColor;opacity:.6}
.canvas .band .cond{font-weight:700;text-transform:uppercase;line-height:1.08;padding:.35em 0}
.canvas .logo0{text-align:center}
.canvas .logo0 img{display:block;margin:0 auto}
.canvas.wide .content{align-items:flex-end;justify-content:center;text-align:right}
.canvas.wide .mid{flex:0 0 auto;align-items:flex-end}
/* layout mode (по раскладке) */
.el{position:absolute;transform:translate(-50%,-50%);max-width:88%;text-align:center}
.el.head{font-weight:800;text-transform:uppercase;line-height:1.0;letter-spacing:-.01em}
.el.disc{font-weight:500;opacity:.9;line-height:1.2}
.el.date{font-weight:600}
.el.sub{font-weight:500;line-height:1.22;opacity:.96}
.el.offer{font-weight:700;text-transform:uppercase;line-height:1.08}
.el .hr{height:1px;background:currentColor;opacity:.6;margin:.3em 0}
.el.logo img{display:block;margin:0 auto}
</style>
<div id="root"></div>
<script>
const LOGO_W="FR_logo_osnv_w-01.png", LOGO_B="FR_logo_osnv.png";
const FMT={
 square:  {w:1080,h:1080,inc:'dtscl',pad:70, st:0,  sb:0,  head:76, sub:29,cond:35,disc:22,date:29,logoH:104,gap:26,wide:0},
 story:   {w:1080,h:1920,inc:'dtscl',pad:80, st:220,sb:250,head:80, sub:33,cond:40,disc:24,date:33,logoH:120,gap:40,wide:0},
 carousel:{w:1000,h:1250,inc:'dtsc', pad:64, st:0,  sb:0,  head:70, sub:27,cond:31,disc:20,date:27,logoH:0,  gap:22,wide:0},
 banner:  {w:1250,h:400, inc:'t',    pad:40, st:0,  sb:0,  head:62, sub:0, cond:0, disc:0, date:26,logoH:0,  gap:12,wide:1}
};
const q=new URLSearchParams(location.search);
const g=k=>q.get(k)||'';
const fkey=(g('f')||'square').toLowerCase();
const p=FMT[fkey]||FMT.square;
const V={p1:g('p1'),p2:g('p2'),p3:g('p3'),p4:g('p4'),p5:g('p5')};
const bgParam=g('bg')||'blue';
const esc=s=>(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

const headHtml=`${esc(V.p1)}`;
const dateHtml=`${fkey==='banner'?'':'✳ '}${esc(V.p4)}`;
const subHtml=`${esc(V.p3)}`;
const offerHtml=`<div class="hr"></div>${esc(V.p2)}<div class="hr"></div>`;
const discHtml=`${esc(V.p5)}`;

let Lraw=g('L');
let mode = Lraw ? 'layout' : 'preset';
let Lobj=null;
if(mode==='layout'){ try{ Lobj=JSON.parse(Lraw); }catch(e){ mode='preset'; } }

const isImg=/^https?:\/\//i.test(bgParam);

function bgLayer(focal,dark){
  const pos=`${focal.x}% ${focal.y}%`;
  if(isImg) return `<div class="bg" style="background:var(--blue);background-position:${pos}"></div>`;
  if(bgParam==='beige') return `<div class="bg" style="background:var(--beige)"></div>`;
  return `<div class="bg" style="background:var(--blue);background-position:${pos}"></div>`;
}

if(mode==='layout'){
  const dark = Lobj.color==='dark';
  const focal = Lobj.focal||{x:50,y:40};
  const scrim = (!dark) ? `<div class="scrim" style="background:linear-gradient(180deg,rgba(0,0,0,.30),rgba(0,0,0,.05) 32%,rgba(0,0,0,.05) 60%,rgba(0,0,0,.40))"></div>`:'';
  const E=Lobj.els||{};
  const draw=(key,cls,html,fs)=>{ const e=E[key]; if(!e)return ''; if((e.x===0&&e.y===0)&&key!=='head')return '';
    return `<div class="el ${cls}" style="left:${e.x}%;top:${e.y}%;font-size:${fs}px;text-align:${e.align||'center'}">${html}</div>`; };
  const logoImg=`<img src="${dark?LOGO_B:LOGO_W}" style="height:${p.logoH||90}px">`;
  const html =
    bgLayer(focal,dark) + scrim +
    draw('disc','disc',discHtml,p.disc||20) +
    draw('head','head',headHtml,p.head) +
    draw('date','date',dateHtml,p.date) +
    draw('sub','sub',subHtml,p.sub||24) +
    draw('offer','offer',offerHtml,p.cond||30) +
    (p.logoH?draw('logo','logo',logoImg,10):'');
  document.getElementById('root').innerHTML=`<div class="canvas${dark?' dark':''}" style="width:${p.w}px;height:${p.h}px">${html}</div>`;
} else {
  const fx=g('fx')||'50', fy=g('fy')||'40';
  const zone=(g('zone')||'').toLowerCase();
  function zoneStyle(z){if(!z)return '';let just='center',items='',ta='';if(z.indexOf('верх')!==-1)just='flex-start';else if(z.indexOf('низ')!==-1)just='flex-end';if(z.indexOf('лев')!==-1){items='flex-start';ta='left';}else if(z.indexOf('прав')!==-1){items='flex-end';ta='right';}else if(z.indexOf('центр')!==-1){items='center';ta='center';}let s='justify-content:'+just+';';if(items)s+='align-items:'+items+';text-align:'+ta+';';return s;}
  const dark=(bgParam==='beige');
  const has=k=>p.inc.indexOf(k)!==-1;
  const bg=isImg?`<div class="bg" style="background-image:url('${bgParam}');background-position:${fx}% ${fy}%"></div>`:`<div class="bg" style="background:${bgParam==='beige'?'var(--beige)':'var(--blue)'};background-position:${fx}% ${fy}%"></div>`;
  const scrim=(isImg&&!dark)?`<div class="scrim" style="background:linear-gradient(180deg,rgba(0,0,0,.36),rgba(0,0,0,.04) 30%,rgba(0,0,0,.04) 60%,rgba(0,0,0,.46))"></div>`:'';
  const date=(has('t')&&V.p4)?`<div class="drow" style="font-size:${p.date}px;margin-top:${p.gap}px">${p.wide?'':'<span>✳</span>'}<span>${esc(V.p4)}</span></div>`:'';
  const sub=(has('s')&&p.sub&&V.p3)?`<div class="subh" style="font-size:${p.sub}px;margin-top:${Math.round(p.gap*0.6)}px">${esc(V.p3)}</div>`:'';
  let band='';
  if(has('c')&&p.cond&&V.p2){const plate=isImg?`<div class="plate" style="background:rgba(0,0,0,.34)"></div>`:'';
    band=`<div class="band" style="margin-top:${Math.round(p.gap*1.25)}px">${plate}<div class="in"><div class="hr"></div><div class="cond" style="font-size:${p.cond}px">${esc(V.p2)}</div><div class="hr"></div></div></div>`;}
  const head=`<div class="head0" style="font-size:${p.head}px">${esc(V.p1)}</div>`;
  const disc=(has('d')&&p.disc&&V.p5)?`<div class="disc0" style="font-size:${p.disc}px">${esc(V.p5)}</div>`:'';
  const logo=(has('l')&&p.logoH)?`<div class="logo0" style="margin-top:${p.gap}px"><img src="${dark?LOGO_B:LOGO_W}" style="height:${p.logoH}px"></div>`:'';
  const mid=`<div class="mid" style="${zoneStyle(zone)}">${head}${date}${sub}${p.wide?'':band}</div>`;
  const inner=p.wide?mid:`${disc}${mid}${logo}`;
  document.getElementById('root').innerHTML=`<div class="canvas${dark?' dark':''}${p.wide?' wide':''}" style="width:${p.w}px;height:${p.h}px"><div class="content" style="padding:${p.pad+p.st}px ${p.pad}px ${p.pad+p.sb}px">${inner}</div></div>`;
  const root=document.getElementById('root').firstChild;
  root.insertAdjacentHTML('afterbegin', bg+scrim);
}
</script>
